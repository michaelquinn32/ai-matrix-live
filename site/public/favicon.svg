<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Globe wireframe with crosshair (AI Matrix) -->
  <circle cx="16" cy="16" r="14" stroke="#e0ddd6" stroke-width="1.5"/>
  <!-- Meridians -->
  <ellipse cx="16" cy="16" rx="5" ry="14" stroke="#e0ddd6" stroke-width="0.8"/>
  <ellipse cx="16" cy="16" rx="10" ry="14" stroke="#e0ddd6" stroke-width="0.8"/>
  <!-- Equator -->
  <ellipse cx="16" cy="16" rx="14" ry="5" stroke="#e0ddd6" stroke-width="0.8"/>
  <!-- Matrix crosshair -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#e0ddd6" stroke-width="1"/>
  <line x1="2" y1="16" x2="30" y2="16" stroke="#e0ddd6" stroke-width="1"/>
</svg>
